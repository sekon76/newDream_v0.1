spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fishingapp
    username: fishinguser
    password: fishing1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: fishing-app-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24시간 (ms)
