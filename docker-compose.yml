services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fishingapp}
      POSTGRES_USER: ${DB_USERNAME:-fishinguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fishingapp}
      DB_USERNAME: ${DB_USERNAME:-fishinguser}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "false"
      KMA_API_KEY: ${KMA_API_KEY}
      KHOA_API_KEY: ${KHOA_API_KEY}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
