name: fishing_app
description: "조황일지 - 낚시 종합 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.1

  # 네비게이션
  go_router: ^14.8.1

  # HTTP 클라이언트
  dio: ^5.8.0

  # 토큰 안전 저장
  flutter_secure_storage: ^9.2.4

  # GPS 위치
  geolocator: ^13.0.2

  # 지역명 → 좌표 변환
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
